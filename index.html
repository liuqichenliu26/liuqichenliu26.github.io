<!DOCTYPE html>
<html lang="zh-CN">
<head>

  <title>古脊新生</title>
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    
    body {
      background-color: #fffef8;
      color: #4a4a4a;
      margin: 0;
      padding: 0;
    }

    .bg-sakura-pink {
      background-color: #ffecf1;
    }

    .text-sakura {
      color: #ff9aa2;
    }

    .gradient-sakura {
      background: linear-gradient(135deg, #ffecf1 0%, #ffffff 100%);
    }

    .calligraphy-font {
      font-family: 'STKaiti', 'KaiTi', 'SimSun', serif;
      text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.8);
    }

    /* 全局样式 */
    .sakura-topic {

      min-height: 100vh;

  <div class="sakura-topic">

    <section class="min-h-screen relative flex items-center justify-center overflow-hidden">
